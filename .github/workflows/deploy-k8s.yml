name: Deploy to K8s (reusable)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      image_tag:
        required: true
        type: string
      values_file:
        required: true
        type: string
      namespace:
        required: true
        type: string
      release_name:
        required: false
        type: string
        default: random-chess-frontend

permissions:
  contents: read

env:
  HELM_VERSION: v3.14.0
  KUBECTL_VERSION: v1.29.0
  LOCAL_PORT: 16443

jobs:
  deploy:
    name: Deploy to K3s (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/${{ env.KUBECTL_VERSION }}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 ${{ vars.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Start SSH tunnel
        id: tunnel
        run: |
          SSH_PORT="22"
          K8S_API_HOST="127.0.0.1"
          K8S_API_PORT="6443"

          echo "Starting SSH tunnel: localhost:${{ env.LOCAL_PORT }} -> ${K8S_API_HOST}:${K8S_API_PORT} via ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }}:${SSH_PORT}"

          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              -o ExitOnForwardFailure=yes \
              -o LogLevel=ERROR \
              -i ~/.ssh/deploy_key \
              -N \
              -L ${{ env.LOCAL_PORT }}:${K8S_API_HOST}:${K8S_API_PORT} \
              -p ${SSH_PORT} \
              ${{ vars.SSH_USER }}@${{ vars.SSH_HOST }} &

          SSH_PID=$!
          echo "ssh_pid=$SSH_PID" >> $GITHUB_OUTPUT

          echo "Waiting for tunnel to be ready..."
          for i in {1..30}; do
            if nc -z 127.0.0.1 ${{ env.LOCAL_PORT }} 2>/dev/null; then
              echo "Tunnel is ready"
              break
            fi
            if ! kill -0 $SSH_PID 2>/dev/null; then
              echo "SSH process died"
              exit 1
            fi
            sleep 1
          done

          if ! nc -z 127.0.0.1 ${{ env.LOCAL_PORT }} 2>/dev/null; then
            echo "Tunnel failed to start"
            exit 1
          fi

      - name: Setup kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          sed -i -E "s|(server: https?://)[^:]+:[0-9]+|\1127.0.0.1:${{ env.LOCAL_PORT }}|g" ~/.kube/config
          echo "Kubeconfig patched to use tunnel at 127.0.0.1:${{ env.LOCAL_PORT }}"

      - name: Verify cluster connection
        run: |
          echo "Testing cluster connectivity..."
          kubectl cluster-info --request-timeout=15s
          kubectl get nodes --request-timeout=15s

      - name: Create namespace
        run: |
          kubectl create namespace "${{ inputs.namespace }}" --dry-run=client -o yaml | kubectl apply -f -

      - name: Create GHCR pull secret
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
        run: |
          if [[ -z "$GHCR_TOKEN" ]]; then
            echo "GHCR_PULL_TOKEN secret not set, skipping"
            exit 0
          fi
          kubectl create secret docker-registry ghcr-random-chess \
            --namespace "${{ inputs.namespace }}" \
            --docker-server=ghcr.io \
            --docker-username=${{ github.repository_owner }} \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "GHCR pull secret created/updated"

      - name: Lint Helm chart
        run: helm lint deployment/helm/random-chess-frontend

      - name: Deploy with Helm
        run: |
          HELM_ARGS=(
            upgrade --install "${{ inputs.release_name }}"
            deployment/helm/random-chess-frontend
            --namespace "${{ inputs.namespace }}"
            --values "${{ inputs.values_file }}"
            --set "image.tag=${{ inputs.image_tag }}"
            --wait
            --timeout 5m
            --atomic
          )

          echo "Deploying: helm ${HELM_ARGS[*]}"
          helm "${HELM_ARGS[@]}"

      - name: Verify deployment
        run: |
          echo "Checking deployment status..."
          kubectl rollout status deployment/"${{ inputs.release_name }}" -n "${{ inputs.namespace }}" --timeout=5m

          echo ""
          echo "Deployment info:"
          kubectl get deployment "${{ inputs.release_name }}" -n "${{ inputs.namespace }}" -o wide

          echo ""
          echo "Pod status:"
          kubectl get pods -n "${{ inputs.namespace }}" -l "app.kubernetes.io/name=random-chess-frontend"

      - name: Cleanup SSH tunnel
        if: always()
        run: |
          if [[ -n "${{ steps.tunnel.outputs.ssh_pid }}" ]]; then
            kill ${{ steps.tunnel.outputs.ssh_pid }} 2>/dev/null || true
          fi

      - name: Cleanup SSH key
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -f ~/.kube/config
