name: Deploy DEV

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
          build-args: |
            VITE_API_URL=https://api.chess.randomtoy.dev
          no-cache: true
          platforms: linux/amd64

  deploy:
    name: Deploy
    needs: build-and-push
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      environment: dev
      image_tag: ${{ needs.build-and-push.outputs.image_tag }}
      values_file: deployment/values-dev.yaml
      namespace: random-chess-dev
    secrets: inherit
